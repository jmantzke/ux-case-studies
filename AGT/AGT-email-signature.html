<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGT Email Signature</title>
  <link rel="stylesheet" href="https://use.typekit.net/bub7qcs.css">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f0ece6;
      font-family: sans-serif;
    }
    .preview-note {
      font-family: sans-serif;
      font-size: 11px;
      color: #999;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .preview-box {
      background: #ffffff;
      display: inline-block;
      padding: 28px 36px;
      border: 1px solid #e0d8ce;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .sig-table { border-collapse: collapse; border-spacing: 0; }
    .sig-logo-cell { vertical-align: middle; padding-right: 32px; }
    .sig-logo-cell img { display: block; width: 120px; height: 120px; }
    .sig-info-cell { vertical-align: middle; }
    .sig-name {
      font-family: "plex-sans", "IBM Plex Sans", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: #393A37;
      margin: 0 0 2px 0;
      line-height: 1.3;
    }
    .sig-company {
      font-family: "elizeth", Georgia, serif;
      font-weight: 400;
      font-size: 14px;
      color: #945100;
      margin: 0 0 14px 0;
      line-height: 1.3;
    }
    .sig-contacts { border-collapse: collapse; border-spacing: 0; }
    .sig-icon-cell {
      vertical-align: middle;
      padding-right: 8px;
      line-height: 0;
    }
    .sig-text-cell {
      vertical-align: middle;
      font-family: "plex-sans", "IBM Plex Sans", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #393A37;
      font-weight: 400;
    }
    .sig-text-cell a {
      color: #393A37;
      text-decoration: none;
    }
    .sig-text-cell a:hover {
      color: #945100;
      text-decoration: underline;
    }
    .sig-spacer { height: 8px; }
    .download-wrap { margin-top: 28px; text-align: center; }
    .dl-btn {
      display: inline-block;
      background: #945100;
      color: #fff;
      font-family: "plex-sans", "IBM Plex Sans", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 10px 26px;
      border-radius: 3px;
      cursor: pointer;
      border: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dl-btn:hover { background: #7a4400; }
    .install-note {
      font-size: 11px;
      color: #aaa;
      margin-top: 10px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
  </style>
</head>

    3. mailto:name@... / name@...         → email address
    4. https://www... / www...            → website URL
  ================================================================
