<svg width="600" height="600" viewBox="0 0 600 600"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="600" height="600" fill="#eef5fb"/>

  <!-- Roads (solid lines) -->
  <!-- Dublin – Belfast (M1/A1) -->
  <line x1="150" y1="400" x2="220" y2="260" stroke="#555" stroke-width="3"/>
  <!-- Belfast – Glasgow (A8/M8 area, schematic) -->
  <line x1="220" y1="260" x2="320" y2="160" stroke="#555" stroke-width="3"/>
  <!-- Glasgow – Carlisle (M74/M6) -->
  <line x1="320" y1="160" x2="340" y2="260" stroke="#555" stroke-width="3"/>
  <!-- Carlisle – Liverpool (M6/M62 area, schematic) -->
  <line x1="340" y1="260" x2="320" y2="360" stroke="#555" stroke-width="3"/>

  <!-- Ferry routes (dashed) -->
  <!-- Dublin – Liverpool -->
  <line x1="150" y1="400" x2="320" y2="360"
        stroke="#0077aa" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- City markers -->
  <g fill="#c0392b" stroke="#ffffff" stroke-width="2">
    <!-- Dublin -->
    <circle cx="150" cy="400" r="7"/>
    <!-- Belfast -->
    <circle cx="220" cy="260" r="7"/>
    <!-- Glasgow -->
    <circle cx="320" cy="160" r="7"/>
    <!-- Carlisle -->
    <circle cx="340" cy="260" r="7"/>
    <!-- Liverpool -->
    <circle cx="320" cy="360" r="7"/>
  </g>

  <!-- City labels -->
  <g font-family="sans-serif" font-size="14" fill="#222">
    <text x="160" y="395">Dublin</text>
    <text x="230" y="255">Belfast</text>
    <text x="330" y="155">Glasgow</text>
    <text x="350" y="255">Carlisle</text>
    <text x="330" y="355">Liverpool</text>
  </g>

  <!-- Road labels -->
  <g font-family="sans-serif" font-size="11" fill="#444">
    <text x="185" y="325">M1 / A1</text>
    <text x="270" y="210">A8 / M8</text>
    <text x="330" y="210">M74 / M6</text>
    <text x="330" y="315">M6 / M62</text>
    <text x="235" y="380" fill="#0077aa">Ferry</text>
  </g>

  <!-- Legend -->
  <g font-family="sans-serif" font-size="12">
    <rect x="30" y="40" width="170" height="70" fill="#ffffff" stroke="#ccc"/>
    <line x1="40" y1="60" x2="70" y2="60" stroke="#555" stroke-width="3"/>
    <text x="80" y="64" fill="#333">Major road</text>

    <line x1="40" y1="80" x2="70" y2="80"
          stroke="#0077aa" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="80" y="84" fill="#333">Ferry route</text>
  </g>
</svg>
